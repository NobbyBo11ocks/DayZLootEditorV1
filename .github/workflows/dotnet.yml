name: build-and-test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./DayZLootEditor.slnx

      - name: Build
        run: dotnet build ./DayZLootEditor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ./DayZLootEditor.slnx --configuration Release --no-build
